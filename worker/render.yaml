# render.yaml - Render Blueprint for Mega Idle Background Worker
services:
  - type: worker
    name: mega-idle-worker
    env: node
    region: singapore
    branch: master
    buildCommand: npm install && cd worker && npm install
    startCommand: node worker/index.js
    envVars:
      - key: NEXTAUTH_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: WORKER_SECRET
        generateValue: true
      - key: NODE_PATH
        value: ./worker/node_modules
        sync: false
