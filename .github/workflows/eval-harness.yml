name: Eval Harness

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      skip_e2e:
        description: 'Skip E2E tests (faster run)'
        required: false
        default: 'false'
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Layer 1: Unit tests (fast, no external deps) ──────────────────────────
  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit -- --reporter=verbose --reporter=json --outputFile=.claude/evals/unit-results.json

      - name: Upload unit test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-results
          path: .claude/evals/unit-results.json

  # ── Layer 2: API tests (Playwright, no browser) ───────────────────────────
  api-tests:
    name: API Tests (Playwright)
    runs-on: ubuntu-latest
    env:
      API_BASE_URL: ${{ vars.API_BASE_URL || 'https://mega-idle-dev.onrender.com' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium only)
        run: npx playwright install --with-deps chromium

      - name: Restore session cache
        id: session-cache
        uses: actions/cache@v4
        with:
          path: tests/e2e/.auth
          key: discord-session-${{ secrets.DISCORD_TEST_USER_ID }}

      - name: Run API tests
        run: npm run test:api
        env:
          CI: true

      - name: Upload API test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-results
          path: test-results/api-results.json

  # ── Layer 3: E2E tests (browser, needs OAuth) ─────────────────────────────
  e2e-tests:
    name: E2E Tests (Playwright Browser)
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_e2e != 'true' }}
    needs: [unit-tests, api-tests]
    env:
      DISCORD_TEST_EMAIL: ${{ secrets.DISCORD_TEST_EMAIL }}
      DISCORD_TEST_PASSWORD: ${{ secrets.DISCORD_TEST_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Restore session cache
        id: session-cache
        uses: actions/cache@v4
        with:
          path: tests/e2e/.auth
          key: discord-session-${{ secrets.DISCORD_TEST_USER_ID }}

      - name: Run E2E tests (landing + game journey)
        run: npm run test:e2e -- tests/e2e/landing.spec.ts tests/e2e/game-journey.spec.ts
        timeout-minutes: 20
        env:
          CI: true

      - name: Upload E2E artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-failure-artifacts
          path: |
            test-results/
            tests/e2e/screenshots/
          retention-days: 7

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: test-results/results.json

  # ── Summary report ────────────────────────────────────────────────────────
  eval-report:
    name: Eval Report
    runs-on: ubuntu-latest
    needs: [unit-tests, api-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download unit results
        uses: actions/download-artifact@v4
        with:
          name: unit-results
          path: .claude/evals/
        continue-on-error: true

      - name: Download API results
        uses: actions/download-artifact@v4
        with:
          name: api-results
          path: test-results/
        continue-on-error: true

      - name: Generate eval report
        run: node scripts/eval-report.js | tee .claude/evals/last-report.json

      - name: Upload eval report
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: .claude/evals/last-report.json
